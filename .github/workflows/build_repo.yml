name: Build and Publish Repo

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'

jobs:
  build:
    name: Build Extensions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Prepare signing key
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          ALIAS: ${{ secrets.ALIAS }}
        run: |
          if [ -n "$SIGNING_KEY_BASE64" ]; then
            echo "Decoding signing key using Python..."
            python3 -c "import base64, os; data = os.environ['SIGNING_KEY_BASE64']; open('signingkey.jks', 'wb').write(base64.b64decode(data))"
            
            if [ -s "signingkey.jks" ]; then
              echo "--- SIGNING KEY FINGERPRINT (SHA-256) ---"
              keytool -list -v -keystore signingkey.jks -alias "$ALIAS" -storepass "$KEY_STORE_PASSWORD" | grep "SHA256:" || echo "Warning: Could not extract fingerprint. Check ALIAS and PASSWORD secrets."
              echo "------------------------------------------"
            else
              echo "Error: signingkey.jks is empty or was not created!"
              exit 1
            fi
          else
            echo "Warning: SIGNING_KEY secret is missing!"
          fi

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build extensions
        env:
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          CI_CHUNK_SIZE: 100
        run: |
          chmod +x gradlew
          if [ -f "signingkey.jks" ]; then
            ./gradlew assembleRelease || ./gradlew assembleDebug
          else
            ./gradlew assembleDebug
          fi

      - name: Create repo artifacts
        run: |
          mkdir -p ~/apk-artifacts
          find . -type f -name "*.apk" -exec cp {} ~/apk-artifacts/ \;
          python3 ./.github/scripts/move-apks.py
          
          # Download Inspector
          INSPECTOR_LINK="$(curl -s "https://api.github.com/repos/aniyomiorg/aniyomi-extensions-inspector/releases/latest" | jq -r '.assets[0].browser_download_url')"
          curl -L "$INSPECTOR_LINK" -o ./Inspector.jar
          
          # Run Inspector and create repo
          echo "{}" > output.json
          java -jar ./Inspector.jar "repo/apk" "output.json" "tmp" || true
          python3 ./.github/scripts/create-repo.py

      - name: Deploy to repo branch
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Save the generated repo folder
          if [ -d "repo" ]; then
            cp -r repo ../repo-output
          else
            echo "Error: repo folder not found!"
            exit 1
          fi
          
          # Fetch and checkout repo branch
          git fetch origin repo || true
          git checkout repo || git checkout --orphan repo
          
          # Completely clear the branch
          git rm -rf . || true
          
          # Move new artifacts back
          cp -r ../repo-output/* .
          
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update extensions repo [$(date)]"
            git push origin repo --force
          else
            echo "No changes to commit"
          fi
